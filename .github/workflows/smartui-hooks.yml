# =============================================================================
# SmartUI Visual Regression — Hooks (WebHook) Flow
# =============================================================================
#
# This workflow runs Ruby Selenium tests on the LambdaTest cloud grid and
# captures SmartUI screenshots using the Hooks (WebHook) approach.
#
# Triggers:
#   - Pull requests targeting main  (visual regression check)
#   - Manual dispatch               (on-demand testing)
#
# Required secrets:
#   LT_USERNAME   — LambdaTest username
#   LT_ACCESS_KEY — LambdaTest access key
#
# The test file can be swapped via the TEST_FILE environment variable:
#   - todo-click-test.rb          (baseline — clean UI)
#   - todo-click-test-modified.rb (modified — dark theme for visual diffs)
#
# =============================================================================

name: SmartUI Hooks - Ruby Selenium

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Test file to run'
        required: false
        default: 'todo-click-test.rb'
        type: choice
        options:
          - todo-click-test.rb
          - todo-click-test-modified.rb

env:
  LT_USERNAME: ${{ secrets.LT_USERNAME }}
  LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}

jobs:
  smartui-hooks-test:
    name: SmartUI Visual Regression (Hooks)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: gem install bundler && bundle install

      - name: Run SmartUI Hooks Test
        env:
          BUILD_NAME: "smartui-hooks-${{ github.run_number }}-${{ github.sha }}"
          SMARTUI_PROJECT: "ruby-smartui-hooks"
        run: |
          TEST_FILE="${{ github.event.inputs.test_file || 'todo-click-test.rb' }}"
          echo "Running: $TEST_FILE"
          bundle exec ruby "$TEST_FILE"
