name: SmartUI Hooks - Ruby Selenium

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Test file to run'
        required: false
        default: 'todo-click-test.rb'
        type: choice
        options:
          - todo-click-test.rb
          - todo-click-test-modified.rb

env:
  LT_USERNAME: ${{ secrets.LT_USERNAME }}
  LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}

jobs:
  smartui-hooks-test:
    name: SmartUI Visual Regression (Hooks)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: gem install bundler && bundle install

      - name: Run SmartUI Hooks Test
        env:
          BUILD_NAME: "smartui-hooks-${{ github.run_number }}-${{ github.sha }}"
          SMARTUI_PROJECT: "ruby-smartui-hooks"
          GIT_URL: "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }}"
        run: |
          TEST_FILE="${{ github.event.inputs.test_file || 'todo-click-test.rb' }}"
          echo "Running: $TEST_FILE"
          bundle exec ruby "$TEST_FILE"
