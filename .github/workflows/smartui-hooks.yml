# =============================================================================
# SmartUI Visual Regression — Hooks (WebHook) Flow with PR Checks
# =============================================================================
#
# This workflow runs Ruby Selenium tests on the LambdaTest cloud grid,
# captures SmartUI screenshots using the Hooks approach, and posts
# SmartUI build results as a status check on the GitHub pull request.
#
# Triggers:
#   - Pull requests targeting main  (visual regression check + PR status)
#   - Manual dispatch               (on-demand testing)
#
# Required secrets:
#   LT_USERNAME   — LambdaTest username
#   LT_ACCESS_KEY — LambdaTest access key
#
# PR Checks:
#   The workflow constructs a GitHub Status API URL and passes it to the
#   test as GIT_URL. SmartUI uses this to post build results (approved /
#   changes found / failed) as a commit status check on the PR.
#
#   URL format: https://api.github.com/repos/{owner}/{repo}/statuses/{sha}
#
# =============================================================================

name: SmartUI Hooks - Ruby Selenium

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_file:
        description: 'Test file to run'
        required: false
        default: 'todo-click-test.rb'
        type: choice
        options:
          - todo-click-test.rb
          - todo-click-test-modified.rb

env:
  LT_USERNAME: ${{ secrets.LT_USERNAME }}
  LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}

jobs:
  smartui-hooks-test:
    name: SmartUI Visual Regression (Hooks)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: gem install bundler && bundle install

      - name: Run SmartUI Hooks Test
        env:
          BUILD_NAME: "smartui-hooks-${{ github.run_number }}-${{ github.sha }}"
          SMARTUI_PROJECT: "ruby-smartui-hooks"

          # Construct the GitHub Status API URL for PR checks.
          # SmartUI uses this to post build results as a commit status on the PR.
          # For GitLab, the format is:
          #   https://gitlab.com/api/v4/projects/{project_id}/statuses/{commit_sha}
          GIT_URL: "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha || github.sha }}"

        run: |
          TEST_FILE="${{ github.event.inputs.test_file || 'todo-click-test.rb' }}"
          echo "Running: $TEST_FILE"
          echo "PR Checks URL: $GIT_URL"
          bundle exec ruby "$TEST_FILE"
